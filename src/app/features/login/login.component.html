<div class="relative min-h-screen flex items-center justify-center bg-slate-950 overflow-hidden">
  <!-- Glowing Background Orbs for Premium Aesthetics -->
  <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-sky-500/20 rounded-full blur-[100px] animate-pulse"></div>
  <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-violet-600/20 rounded-full blur-[100px] delay-1000 animate-pulse"></div>

  <!-- Main Login Card -->
  <div class="relative w-full max-w-md p-8 bg-slate-900/60 backdrop-blur-xl border border-slate-800 rounded-3xl shadow-2xl text-center z-10 mx-4 transition-all duration-300 hover:border-sky-500/30">
    
    <!-- Branding/Logo -->
    <div class="flex flex-col items-center mb-8">
      <div class="w-16 h-16 bg-gradient-to-tr from-sky-500 to-indigo-600 rounded-2xl flex items-center justify-center shadow-lg shadow-sky-500/20 mb-4 transform hover:rotate-6 transition-transform">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="white" class="w-8 h-8">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
          <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1 1 15 0Z" />
        </svg>
      </div>
      <h1 class="text-3xl font-extrabold tracking-tight text-white">College Compass</h1>
      <p class="text-slate-400 mt-2 text-sm">Final Year Project Web Dashboard</p>
    </div>

    <div class="space-y-6">
      <div class="text-center">
        <h2 class="text-xl font-semibold text-slate-200">Welcome Back</h2>
        <p class="text-slate-400 text-xs mt-1">Please sign in with your student or admin Google account.</p>
      </div>

      <!-- Error Message Box -->
      <div *ngIf="errorMessage" class="p-3 bg-sky-500/10 border border-sky-500/20 rounded-xl text-sky-400 text-xs text-left">
        {{ errorMessage }}
      </div>

      <!-- Google Sign In Button with hover scaling and shadow-glow -->
      <button 
        (click)="onGoogleLogin()"
        [disabled]="authService.loading()"
        class="w-full flex items-center justify-center gap-3 px-5 py-4 bg-white hover:bg-slate-50 text-slate-900 font-semibold rounded-2xl shadow-lg border border-slate-200 transition-all duration-300 hover:scale-[1.02] active:scale-[0.98] disabled:opacity-50 disabled:cursor-not-allowed">
        
        <svg *ngIf="!authService.loading()" class="w-5 h-5" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22c-.87-2.6-2.86-4.53-5.84-4.53z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z"/>
        </svg>

        <span *ngIf="authService.loading()" class="w-5 h-5 border-2 border-slate-900 border-t-transparent rounded-full animate-spin"></span>
        <span>{{ authService.loading() ? 'Authenticating...' : 'Sign in with Google' }}</span>
      </button>
    </div>

    <!-- Footer Information -->
    <div class="mt-8 text-xs text-slate-500">
      College Compass © 2026. Secure Admin Console.
    </div>
  </div>
</div>
